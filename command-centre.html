<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The GTA Girl — Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============ Tokens (shared with the fitness dashboard design system) ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --container-max: 1280px;
  --bg: #e2efe7;
  --card: #ffffff;
  --tint: #c7dacb;
  --tint-soft: #d9eadb;
  --tint-track: #b5cbb9;
  --cream: #f5f2ef;
  --dark: #1c1d21;
  --lime: #d7f576;
  --orange: #ea6328;
  --olive: #9ca495;
  --red: #ef4444;
  --chip-blue: #eff6ff;
  --text-1: #1a1a1a;
  --text-2: #1f2937;
  --text-3: #374151;
  --text-4: #4b5563;
  --text-muted: #6b7280;
  --text-faint: #9ca3af;
  --shadow-sm: 0 1px 1px rgba(0,0,0,0.05);
  --radius-card: 24px;
}
body {
  font-family: "Inter", -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-2);
  min-height: 100vh;
  padding: 32px;
  font-size: 14px;
}
button { font-family: inherit; font-size: inherit; border: none; background: none; cursor: pointer; color: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; color: var(--text-2); border: 1px solid #e5e7eb; border-radius: 10px; padding: 9px 12px; background: #fff; width: 100%; }
textarea { min-height: 64px; resize: vertical; }
a { color: var(--text-3); }

.app { display: flex; gap: 24px; max-width: var(--container-max); margin: 0 auto; }

/* ============ Main / topbar ============ */
.logo { width: 44px; height: 44px; flex-shrink: 0; background: var(--dark); color: var(--lime); border-radius: 12px; box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; letter-spacing: -0.5px; margin-left: 4px; }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 20px; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px; border-radius: 9999px; background: rgba(255,255,255,0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); flex-wrap: wrap; }
.nav-tabs { display: flex; gap: 4px; padding: 4px; border-radius: 9999px; background: rgba(255,255,255,0.5); flex-wrap: wrap; }
.tab { padding: 10px 18px; border-radius: 9999px; font-size: 14px; color: var(--text-3); white-space: nowrap; min-height: 44px; }
.tab.is-active { background: var(--dark); color: #fff; }
.top-actions { display: flex; align-items: center; gap: 8px; padding-right: 4px; }
.round-btn { min-width: 44px; height: 44px; padding: 0 14px; border-radius: 9999px; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 14px; color: var(--text-4); white-space: nowrap; }
.round-btn.dark { background: var(--dark); color: #fff; }

.greeting { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.greeting h1 { font-size: 28px; line-height: 34px; font-weight: 400; color: var(--text-2); }
.greeting .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ============ Cards & shared bits ============ */
.card { background: var(--card); border-radius: var(--radius-card); box-shadow: var(--shadow-sm); padding: 20px; }
.card.tint { background: var(--tint); }
.card.cream { background: var(--cream); }
.card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
.card-title { font-size: 14px; font-weight: 500; color: var(--text-1); display: flex; align-items: center; gap: 8px; }
.pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 11px; line-height: 16px; white-space: nowrap; }
.pill.dark { background: var(--dark); color: #fff; }
.pill.lime { background: var(--lime); color: var(--text-1); }
.pill.soft { background: var(--tint-soft); color: var(--text-3); }
.pill.orange { background: var(--orange); color: #fff; }
.pill.grey { background: #f3f4f6; color: var(--text-4); }
.pill.blue { background: var(--chip-blue); color: var(--text-2); }
.pill.red { background: #fee2e2; color: #b91c1c; }
.muted { color: var(--text-muted); }
.small { font-size: 12px; }

/* ============ Home ============ */
.home-grid { display: grid; grid-template-columns: repeat(12, minmax(0,1fr)); gap: 20px; }
.span-12 { grid-column: span 12; } .span-8 { grid-column: span 8; } .span-6 { grid-column: span 6; } .span-4 { grid-column: span 4; } .span-3 { grid-column: span 3; }

.countdown-card { display: flex; flex-direction: column; gap: 14px; }
.count-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
.count-big { font-size: 52px; line-height: 1; letter-spacing: -1.5px; color: var(--text-1); font-weight: 500; }
.count-big span { font-size: 15px; letter-spacing: 0; font-weight: 400; color: var(--text-3); }
.phase-bar { display: flex; height: 8px; border-radius: 9999px; overflow: visible; position: relative; margin-top: 22px; }
.phase-seg { position: relative; height: 100%; }
.phase-seg em { position: absolute; left: 0; top: -18px; font-style: normal; font-size: 10px; color: var(--text-4); white-space: nowrap; }
.phase-seg:first-child { border-radius: 9999px 0 0 9999px; }
.phase-seg:last-child { border-radius: 0 9999px 9999px 0; }
.today-marker { position: absolute; top: -5px; width: 2px; height: 18px; background: var(--dark); border-radius: 2px; }
.today-marker::after { content: "today"; position: absolute; top: 19px; left: -14px; font-size: 9px; color: var(--text-2); }

.kpi-row { display: flex; gap: 20px; }
.kpi { flex: 1; min-width: 0; background: var(--card); border-radius: var(--radius-card); box-shadow: var(--shadow-sm); padding: 16px; display: flex; flex-direction: column; gap: 6px; }
.kpi .k-label { font-size: 12px; color: var(--text-muted); }
.kpi .k-value { font-size: 26px; line-height: 32px; color: var(--text-1); }
.kpi .k-sub { font-size: 11px; color: var(--text-faint); }

.attn-list, .week-list { display: flex; flex-direction: column; gap: 8px; }
.attn-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(255,255,255,0.55); border-radius: 12px; padding: 10px 12px; font-size: 13px; }
.attn-item .go { min-height: 32px; padding: 4px 12px; border-radius: 9999px; background: var(--dark); color: #fff; font-size: 12px; flex-shrink: 0; }
.attn-item.hot { background: var(--lime); }
.empty-note { font-size: 13px; color: var(--text-muted); padding: 6px 2px; }

.quick-row { display: flex; gap: 10px; flex-wrap: wrap; }
.quick-btn { min-height: 44px; padding: 10px 16px; border-radius: 9999px; background: var(--card); box-shadow: var(--shadow-sm); font-size: 14px; color: var(--text-3); }
.quick-btn:hover { background: var(--tint-soft); }

/* ============ Boards ============ */
.board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; align-items: flex-start; }
.bcol { flex: 1; min-width: 200px; background: rgba(255,255,255,0.45); border-radius: 18px; padding: 10px; }
.bcol h3 { font-size: 12px; font-weight: 500; color: var(--text-4); padding: 4px 6px 10px; display: flex; justify-content: space-between; }
.bcol h3 .cnt { color: var(--text-faint); }
.bcard { background: var(--card); border-radius: 14px; box-shadow: var(--shadow-sm); padding: 12px; margin-bottom: 10px; cursor: pointer; }
.bcard .t { font-size: 13px; font-weight: 500; color: var(--text-1); margin-bottom: 6px; }
.bcard .m { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.bcard .days { font-size: 11px; color: var(--text-faint); }
.bcard .thumb { width: 100%; height: 64px; border-radius: 10px; background: var(--tint-soft); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 8px; overflow: hidden; }
.bcard .thumb img { width: 100%; height: 100%; object-fit: cover; }
.bcard-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.adv { min-width: 44px; min-height: 32px; padding: 4px 12px; border-radius: 9999px; background: var(--tint-soft); color: var(--text-2); font-size: 12px; font-weight: 500; }
.adv:hover { background: var(--lime); }

/* ============ Tables ============ */
.tablewrap { background: var(--card); border-radius: var(--radius-card); box-shadow: var(--shadow-sm); overflow: auto; }
table { border-collapse: collapse; width: 100%; min-width: 760px; }
th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #f0f2f0; vertical-align: top; font-size: 13px; }
th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 500; position: sticky; top: 0; background: var(--card); }
tr:last-child td { border-bottom: none; }
td select { width: auto; padding: 6px 8px; font-size: 12px; border-radius: 8px; }
.rowlink { font-weight: 500; color: var(--text-1); cursor: pointer; }

.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.toolbar input[type=text] { flex: 1; min-width: 160px; border-radius: 9999px; }
.toolbar select { width: auto; border-radius: 9999px; }
.seg-toggle { display: flex; padding: 4px; border-radius: 9999px; background: rgba(255,255,255,0.5); }
.seg-toggle button { padding: 8px 16px; border-radius: 9999px; font-size: 13px; color: var(--text-4); min-height: 40px; }
.seg-toggle button.on { background: var(--dark); color: #fff; }

/* ============ Gallery (characters) ============ */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 16px; }
.gcard { background: var(--card); border-radius: 18px; box-shadow: var(--shadow-sm); padding: 14px; cursor: pointer; }
.gcard .portrait { height: 120px; border-radius: 12px; background: var(--tint); display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 10px; overflow: hidden; }
.gcard .portrait img { width: 100%; height: 100%; object-fit: cover; }
.gcard h4 { font-size: 14px; font-weight: 500; color: var(--text-1); margin-bottom: 4px; }
.gcard p { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }

/* ============ Calendar ============ */
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.cal-grid .dow { font-size: 10px; text-transform: uppercase; color: var(--text-faint); padding: 2px 6px; }
.cal-cell { min-height: 74px; background: rgba(255,255,255,0.55); border-radius: 10px; padding: 6px; font-size: 11px; }
.cal-cell.other { opacity: 0.35; }
.cal-cell .dnum { color: var(--text-muted); margin-bottom: 4px; }
.cal-cell.today .dnum { background: var(--dark); color: #fff; border-radius: 9999px; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
.cal-item { background: var(--tint-soft); border-radius: 6px; padding: 2px 5px; margin-bottom: 3px; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.cal-item.posted { background: var(--lime); }

/* ============ Runway ============ */
.phase-card { margin-bottom: 16px; }
.phase-card .ph-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.ms-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
.ms-row:last-child { border-bottom: none; }
.ms-check { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--olive); background: #fff; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; padding: 0; }
.ms-check.done { background: var(--lime); border-color: var(--lime); }
.ms-row .due { margin-left: auto; font-size: 11px; color: var(--text-faint); white-space: nowrap; }
.ms-row .due.overdue { color: var(--orange); font-weight: 500; }
.progress { height: 6px; border-radius: 9999px; background: #f3f4f6; overflow: hidden; flex: 1; max-width: 180px; }
.progress i { display: block; height: 100%; background: var(--lime); border-radius: 9999px; }

/* ============ Modal / toast ============ */
.overlay { position: fixed; inset: 0; background: rgba(28,29,33,0.45); display: none; align-items: flex-start; justify-content: center; padding: 30px 16px; overflow: auto; z-index: 40; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 20px; width: 100%; max-width: 620px; padding: 24px; }
.modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 16px; color: var(--text-1); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
.modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 8px; }
.modal-actions .right { display: flex; gap: 8px; margin-left: auto; }
.btn { min-height: 44px; padding: 10px 18px; border-radius: 9999px; font-size: 14px; }
.btn.primary { background: var(--dark); color: #fff; }
.btn.ghost { background: #f3f4f6; color: var(--text-3); }
.btn.danger { background: #fee2e2; color: #b91c1c; }
.linked { margin-top: 14px; border-top: 1px solid #f0f2f0; padding-top: 12px; }
.linked h5 { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.linked .lk { display: inline-block; background: var(--tint-soft); border-radius: 9999px; padding: 4px 12px; margin: 0 6px 6px 0; font-size: 12px; cursor: pointer; }

#toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); background: var(--dark); color: #fff; border-radius: 9999px; padding: 12px 20px; font-size: 13px; display: none; align-items: center; gap: 14px; z-index: 60; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); max-width: calc(100vw - 32px); }
#toast.show { display: flex; }
#toast button { color: var(--lime); font-weight: 600; min-height: 32px; }

.checklist li { list-style: none; display: flex; gap: 10px; padding: 7px 0; font-size: 13px; color: var(--text-3); }
.checklist li b { color: var(--text-1); font-weight: 600; }
.checklist .num { width: 22px; height: 22px; border-radius: 9999px; background: var(--lime); color: var(--text-1); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.view { display: none; flex-direction: column; gap: 20px; }
.view.on { display: flex; }

/* ============ Icons ============ */
svg.ic { flex-shrink: 0; vertical-align: -0.18em; display: inline-block; }

/* ============ Server table extras ============ */
.avatar-tile { width: 34px; height: 34px; border-radius: 10px; background: var(--tint-soft); color: var(--text-2); font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.srv-cell { display: flex; gap: 10px; align-items: center; }
.linkchips { display: flex; gap: 4px; flex-wrap: wrap; }
.lchip { width: 28px; height: 28px; border-radius: 9999px; background: #f3f4f6; display: inline-flex; align-items: center; justify-content: center; color: var(--text-4); text-decoration: none; }
a.lchip:hover { background: var(--tint-soft); color: var(--text-1); }
.lchip.verify { width: auto; padding: 0 9px; background: #fff7ed; color: #b45309; font-size: 10px; font-style: italic; }
.iconbtn-sm { width: 32px; height: 32px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-faint); }
.iconbtn-sm:hover { background: #f3f4f6; color: var(--text-2); }
.due-line { font-size: 11px; color: var(--text-faint); margin-top: 3px; }
.due-line.overdue { color: var(--orange); font-weight: 500; }
.stage-days { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
tbody tr:hover td { background: #fafbfa; }

/* ============ Responsive ============ */
@media (max-width: 1119px) {
  .home-grid .span-8, .home-grid .span-6, .home-grid .span-4, .home-grid .span-3 { grid-column: span 12; }
  .kpi-row { flex-wrap: wrap; }
  .kpi { min-width: 150px; flex: 1 1 40%; }
}
@media (max-width: 767px) {
  body { padding: 14px; }
  .count-big { font-size: 40px; }
  .board { gap: 10px; }
  .bcol { min-width: 180px; }
  .cal-cell { min-height: 54px; }
  .modal { padding: 18px; }
  .grid2 { grid-template-columns: 1fr; }
  /* touch targets ≥44px on phones (brief §11 a11y) */
  .adv { min-height: 44px; padding: 8px 16px; }
  .ms-check { width: 44px; height: 44px; border-radius: 12px; }
  .attn-item .go { min-height: 44px; }
}
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <header class="topbar">
      <div class="logo">GG</div>
      <nav class="nav-tabs" id="navTabs"></nav>
      <div class="top-actions">
        <button class="round-btn dark" onclick="openQuickAdd()">+ Add</button>
        <button class="round-btn" onclick="exportJSON()" title="Export all data as JSON">Export</button>
        <button class="round-btn" onclick="document.getElementById('importFile').click()" title="Import JSON">Import</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)" />
      </div>
    </header>

    <div class="greeting">
      <div>
        <h1 id="greetTitle">Hello, Ravni</h1>
        <div class="sub" id="greetSub"></div>
      </div>
    </div>

    <!-- HOME -->
    <section class="view" id="view-home">
      <div class="home-grid">
        <div class="card tint countdown-card span-8">
          <div class="card-head" style="margin-bottom:0">
            <div class="card-title"><i data-ic="timer"></i> GTA 6 launch — 19 Nov 2026</div>
            <span class="pill dark" id="phasePill"></span>
          </div>
          <div class="count-row">
            <div class="count-big" id="daysLeft"></div>
            <div class="small" id="nextMilestone"></div>
          </div>
          <div class="phase-bar" id="phaseBar"></div>
        </div>
        <div class="card cream span-4">
          <div class="card-head"><div class="card-title"><i data-ic="clock"></i> Cfx review clock</div></div>
          <div id="cfxClock"></div>
        </div>

        <div class="span-12 kpi-row" id="kpiRow"></div>

        <div class="card tint span-6">
          <div class="card-head"><div class="card-title"><i data-ic="zap"></i> Needs attention</div></div>
          <div class="attn-list" id="attnList"></div>
        </div>
        <div class="card span-6">
          <div class="card-head"><div class="card-title"><i data-ic="pin"></i> This week</div><span class="pill grey" id="weekCount"></span></div>
          <div class="week-list" id="weekList"></div>
        </div>

        <div class="span-12">
          <div class="quick-row" id="quickRow"></div>
        </div>
      </div>
    </section>

    <!-- ARTWORKS -->
    <section class="view" id="view-artworks">
      <div class="toolbar">
        <input type="text" id="artSearch" placeholder="Search artworks…" oninput="render()" />
        <select id="artType" onchange="render()">
          <option value="">All types</option>
          <option>canon reimagining</option><option>original character</option><option>other</option>
        </select>
        <button class="quick-btn" onclick="openForm('artwork')">+ Artwork</button>
      </div>
      <div class="board" id="artBoard"></div>
    </section>

    <!-- CHARACTERS -->
    <section class="view" id="view-characters">
      <div class="toolbar">
        <span class="small muted">Rayet IP only — canon subjects live in Artworks.</span>
        <span style="flex:1"></span>
        <button class="quick-btn" onclick="openForm('character')">+ Character</button>
      </div>
      <div class="gallery" id="charGallery"></div>
    </section>

    <!-- CONTENT -->
    <section class="view" id="view-content">
      <div class="toolbar">
        <div class="seg-toggle">
          <button id="cvBoard" class="on" onclick="setContentView('board')">Board</button>
          <button id="cvCal" onclick="setContentView('calendar')">Calendar</button>
        </div>
        <select id="contentPlatform" onchange="render()">
          <option value="">All platforms</option>
          <option>Instagram</option><option>YouTube Shorts</option><option>TikTok</option><option>X</option>
        </select>
        <span style="flex:1"></span>
        <button class="quick-btn" onclick="openForm('content')">+ Post</button>
      </div>
      <div class="board" id="contentBoard"></div>
      <div class="card" id="contentCal" style="display:none">
        <div class="cal-head">
          <button class="quick-btn" onclick="calShift(-1)">‹</button>
          <div class="card-title" id="calTitle"></div>
          <button class="quick-btn" onclick="calShift(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </section>

    <!-- SERVERS -->
    <section class="view" id="view-servers">
      <div class="toolbar">
        <div class="seg-toggle">
          <button id="svBoard" onclick="setServerView('board')">Board</button>
          <button id="svTable" class="on" onclick="setServerView('table')">Table</button>
        </div>
        <input type="text" id="srvSearch" placeholder="Search servers, people…" oninput="render()" />
        <select id="srvPriority" onchange="render()">
          <option value="">All priorities</option>
          <option>High</option><option>Med-High</option><option>Medium</option><option>Low-Med</option><option>Low</option>
        </select>
        <button class="quick-btn" onclick="openForm('server')">+ Server</button>
      </div>
      <div class="board" id="srvBoard" style="display:none"></div>
      <div class="tablewrap" id="srvTableWrap">
        <table>

}

  const list = S[kind + 's'] || S[kind];

  const i = stages.indexOf(r.status);
  if (i < 0 || i >= stages.length - 1) return;
  snapshotUndo(`${r.title || r.name} → ${stages[i + 1]}`);
  r.status = stages[i + 1];
  r.stageAt = TODAY(); r.updated = TODAY();
  if (kind === 'content' && r.status === 'posted' && !r.postedDate) r.postedDate = TODAY();
  persist(); render();
  if (kind === 'artwork' && r.status === 'finished') offerSpawn(r);
  if (kind === 'character' && r.status === 'audience-validated') offerValidated(r);
}

    ['Followers', followers.toLocaleString(), `IG ${(snap.ig||0).toLocaleString()} · X ${(snap.x||0).toLocaleString()} · TT ${(snap.tiktok||0).toLocaleString()} · YT ${(snap.yt||0).toLocaleString()}`],

    ['Servers in pipeline', activeSrv, `${S.servers.filter(x => x.status === 'won').length} won · ${S.servers.length} total`],

  ].map(([l, v, sub]) => `<div class="kpi"><div class="k-label">${l}</div><div class="k-value">${v}</div><div class="k-sub">${sub}</div></div>`).join('');

  /* Needs attention */
  const attn = [];
  S.content.filter(c => c.hot).forEach(c =>
    attn.push({ hot: true, txt: `${ic('flame', 14)} "${esc(c.title)}" is blowing up — deploy the origin story <b>today</b>`, act: `openOrigin()`, btn: 'Checklist' }));
  S.servers.filter(s => s.nextDue && s.nextDue < t && !['won', 'passed'].includes(s.status)).forEach(s =>
    attn.push({ txt: `Overdue: <b>${esc(s.name)}</b> — ${esc(s.next)}`, act: `openForm('server','${s.id}')`, btn: 'Open' }));
  ['artwork', 'content', 'server'].forEach(kind => {
    const list = kind === 'artwork' ? S.artworks : kind === 'content' ? S.content : S.servers;
    const terminal = { artwork: 'finished', content: 'posted', server: 'won' };
    list.filter(r => daysIn(r) > STUCK_DAYS && r.status !== terminal[kind] && r.status !== 'passed' && r.status !== 'not started' && r.status !== 'idea')
      .slice(0, 3).forEach(r =>
        attn.push({ txt: `Stuck ${daysIn(r)}d in <b>${esc(r.status)}</b>: ${esc(r.title || r.name)}`, act: kind === 'server' ? `openForm('server','${r.id}')` : `nav('${kind}s')`, btn: 'Go' }));
  });
  const lastSnap = S.snapshots[S.snapshots.length - 1];
  if (!lastSnap || daysBetween(lastSnap.date, t) >= 7)
    attn.push({ txt: 'Weekly snapshot due — 2 minutes, keeps the KPIs honest', act: `openForm('snapshot')`, btn: 'Log it' });
  if (!S.settings.cfxSubmitted)
    attn.push({ txt: 'Cfx application not submitted — <b>this is action #1</b>', act: `nav('runway')`, btn: 'Runway' });
  document.getElementById('attnList').innerHTML = attn.length
    ? attn.slice(0, 6).map(a => `<div class="attn-item ${a.hot ? 'hot' : ''}"><span>${a.txt}</span><button class="go" onclick="${a.act}">${a.btn}</button></div>`).join('')
    : '<div class="empty-note">Nothing stuck, nothing overdue. Go draw.</div>';

  /* This week */
  const soon = new Date(Date.now() + 14 * 864e5).toISOString().slice(0, 10);
  const due = S.milestones.filter(m => !m.done && m.due <= soon).sort((a, b) => a.due.localeCompare(b.due));
  document.getElementById('weekCount').textContent = due.length + ' due';
  document.getElementById('weekList').innerHTML = due.length
    ? due.map(m => `<div class="attn-item"><span>${m.due < t ? `<span style="color:var(--orange)">${ic('alert', 13)}</span> ` : ''}${esc(m.title)}</span><span class="small muted" style="flex-shrink:0">${fmtDay(m.due)}</span></div>`).join('')
    : '<div class="empty-note">Nothing due in the next two weeks.</div>';

  document.getElementById('quickRow').innerHTML = [
    ['image', 'New artwork', `openForm('artwork')`], ['calendar', 'Log a post', `openForm('content')`],
    ['server', 'New server', `openForm('server')`], ['user', 'New character', `openForm('character')`],
    ['banknote', 'Log revenue', `openForm('revenue')`], ['chart', 'Snapshot', `openForm('snapshot')`],
  ].map(([i, l, a]) => `<button class="quick-btn" onclick="${a}">${ic(i, 14)} ${l}</button>`).join('');
}

function initials(name) {
  return name.split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();

function linkChips(s) {
  const chips = [];
  const add = (val, icon, kind, title) => {
    if (!val) return;
    if (val === 'verify') { chips.push(`<span class="lchip verify" title="${title}: needs verifying">verify</span>`); return; }
    let url = val;
    if (kind === 'x') url = 'https://x.com/' + val.replace(/^@/, '');
    else if (kind === 'ig' && val.startsWith('@')) url = 'https://instagram.com/' + val.replace(/^@/, '');
    else if (!/^https?:/.test(val)) url = 'https://' + val;
    if (kind === 'discord' && !/discord|\./.test(val)) { chips.push(`<span class="lchip" title="Discord: ${esc(val)}">${ic(icon, 13)}</span>`); return; }
    chips.push(`<a class="lchip" href="${esc(url)}" target="_blank" rel="noopener" title="${title}: ${esc(val)}">${ic(icon, 13)}</a>`);
  };
  add(s.website, 'globe', 'web', 'Website');
  add(s.x, 'xlogo', 'x', 'X');
  add(s.instagram, 'instagram', 'ig', 'Instagram');
  add(s.discord, 'chat', 'discord', 'Discord');
  return `<div class="linkchips">${chips.join('') || '<span class="small muted">—</span>'}</div>`;
}

    const v = r[k] != null ? r[k] : '';
    let input;
    if (type === 'select') input = `<select id="f_${k}">${opts.map(o => `<option value="${esc(o)}" ${o === v ? 'selected' : ''}>${o || '—'}</option>`).join('')}</select>`;
    else if (type === 'textarea') input = `<textarea id="f_${k}">${esc(v)}</textarea>`;
    else if (type === 'charsel') input = `<select id="f_${k}"><option value="">— none —</option>${S.characters.map(c => `<option value="${c.id}" ${c.id === v ? 'selected' : ''}>${esc(c.name)}</option>`).join('')}</select>`;
    else if (type === 'artsel') input = `<select id="f_${k}"><option value="">— none —</option>${S.artworks.map(a => `<option value="${a.id}" ${a.id === v ? 'selected' : ''}>${esc(a.title)}</option>`).join('')}</select>`;
    else input = `<input type="${type}" id="f_${k}" value="${esc(v)}" />`;
    return `<div class="field ${span || ''}"><label>${label}</label>${input}</div>`;
  }).join('');

  let linked = '';
  if (id && kind === 'artwork') {
    const posts = S.content.filter(c => c.artworkId === id);
    linked = `<div class="linked"><h5>Derived content (${posts.length})</h5>${posts.map(c => `<span class="lk" onclick="openForm('content','${c.id}')">${esc(c.title.slice(0, 32))}</span>`).join('') || '<span class="small muted">None yet — finish it and spawn.</span>'}</div>`;
  }
  if (id && kind === 'character') {
    const arts = S.artworks.filter(a => a.characterId === id);
    linked = `<div class="linked"><h5>Linked artworks (${arts.length})</h5>${arts.map(a => `<span class="lk" onclick="openForm('artwork','${a.id}')">${esc(a.title)}</span>`).join('') || '<span class="small muted">None yet.</span>'}</div>`;
  }

  openModal(`
    <h2>${id ? 'Edit' : 'New'} ${def.title.toLowerCase()}</h2>
    <div class="grid2">${fieldHTML}</div>
    ${linked}
    <div class="modal-actions">
      ${id ? `<button class="btn danger" onclick="deleteRec()">Delete</button>` : ''}
      <div class="right">
        <button class="btn ghost" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="saveForm()">Save</button>
      </div>
    </div>`);
}
function saveForm() {
  const def = FORM_DEFS[formKind];
  const list = def.list();
  snapshotUndo(formId ? 'Record updated' : 'Record added');
  let r = formId ? byId(list, formId) : rec({});
  const oldStatus = r.status;
  def.fields.forEach(([k,, type]) => {
    const el = document.getElementById('f_' + k);
    if (!el) return;
    r[k] = type === 'number' ? (+el.value || 0) : el.value;
  });
  r.updated = TODAY();
  if (r.status && r.status !== oldStatus) r.stageAt = TODAY();
  if (!formId) list.push(r);
  persist(); closeModal(); render();
  if (formKind === 'artwork' && r.status === 'finished' && oldStatus !== 'finished') offerSpawn(r);
}
function deleteRec() {
  const def = FORM_DEFS[formKind];
  const list = def.list();
  const r = byId(list, formId);
  snapshotUndo(`Deleted ${r.title || r.name || def.title} — undo?`);
  list.splice(list.indexOf(r), 1);
  persist(); closeModal(); render();
}

function openQuickAdd() {
  openModal(`
    <h2>Quick add</h2>
    <div class="quick-row">${[
      ['image', 'Artwork', 'artwork'], ['calendar', 'Post', 'content'], ['server', 'Server', 'server'],
      ['user', 'Character', 'character'], ['banknote', 'Revenue', 'revenue'], ['chart', 'Snapshot', 'snapshot'],
    ].map(([i, l, k]) => `<button class="quick-btn" onclick="openForm('${k}')">${ic(i, 14)} ${l}</button>`).join('')}</div>
    <div class="modal-actions"><div class="right"><button class="btn ghost" onclick="closeModal()">Cancel</button></div></div>`);
}

/* ================= Modal plumbing ================= */
function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });

/* ================= Export / import ================= */
function exportJSON() {
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(S, null, 2));
  a.download = `gta-girl-command-centre-${TODAY()}.json`;
  a.click();
}
function importJSON(input) {
  const f = input.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const d = JSON.parse(rd.result);
      if (!d.artworks || !d.servers) throw new Error('Not a command-centre export');
      snapshotUndo('Imported data — undo restores what you had');
      S = d; persist(); render();
    } catch (e) { alert('Import failed: ' + e.message); }
  };
  rd.readAsText(f);
  input.value = '';
}

/* ================= Render root ================= */
function render() {
  renderNav();
  if (currentView === 'home') renderHome();
  if (currentView === 'artworks') renderArtworks();
  if (currentView === 'characters') renderCharacters();
  if (currentView === 'content') renderContent();
  if (currentView === 'servers') renderServers();
  if (currentView === 'runway') renderRunway();
  if (currentView === 'snapshots') renderSnapshots();
}
render();
</script>
</body>
